<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI & Technology Blog</title>
    <link rel="alternate" type="application/rss+xml" title="RSS Feed" href="/feed.xml">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0a0a0a;
            color: #e0e0e0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .container {
            max-width: 600px;
            padding: 40px;
            text-align: center;
        }
        h1 {
            font-size: 2.5rem;
            margin-bottom: 16px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .description {
            font-size: 1.1rem;
            color: #999;
            margin-bottom: 32px;
            line-height: 1.6;
        }
        .links {
            display: flex;
            gap: 16px;
            justify-content: center;
            flex-wrap: wrap;
        }
        .links a {
            display: inline-block;
            padding: 12px 24px;
            border-radius: 8px;
            text-decoration: none;
            font-weight: 500;
            transition: transform 0.2s;
        }
        .links a:hover { transform: translateY(-2px); }
        .rss-link {
            background: #ff6600;
            color: #fff;
        }
        .posts-link {
            background: #333;
            color: #e0e0e0;
            border: 1px solid #444;
        }
        footer {
            margin-top: 48px;
            font-size: 0.85rem;
            color: #555;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>AI & Technology Blog</h1>
        <p class="description">Articles about AI, neural networks, and modern technology. Subscribe via RSS to stay updated.</p>
        <div class="links">
            <a href="/feed.xml" class="rss-link">RSS Feed</a>
        </div>
        <footer>lcr154.github.io</footer>
    </div>
</body>
</html>
